# ──────────────────────────────────────────────────────────────────────────────
#  WAVE — Multi-Platform CI/CD
#  Builds: Windows (installer), Linux x64 (AppImage),
#          macOS ARM64 (Apple Silicon), macOS Intel, iOS (IPA)
# ──────────────────────────────────────────────────────────────────────────────
name: Build WAVE

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    name: Windows (Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Create .env from secret
        shell: bash
        run: echo "DEEZER_PROXY_URL=${{ secrets.DEEZER_PROXY_URL }}" > .env

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: WAVE-Windows-Installer
          path: installer/windows/Output/WAVE-Windows-Setup.exe

  # ─── Linux x64 ───────────────────────────────────────────────────────────
  linux-x64:
    name: Linux x64 (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev xvfb

      - name: Generate Linux platform files
        run: |
          if [ ! -d "linux" ]; then
            flutter create --platforms=linux .
          fi

      - name: Create .env from secret
        run: echo "DEEZER_PROXY_URL=${{ secrets.DEEZER_PROXY_URL }}" > .env

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Test Launching Linux App
        run: |
          xvfb-run --auto-servernum timeout 10 ./build/linux/x64/release/bundle/wave || if [ $? -eq 124 ]; then exit 0; else exit 1; fi

      - name: Package as AppImage
        run: |
          curl -fSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimagetool
          chmod +x appimagetool

          APP=WAVE.AppDir
          mkdir -p "$APP"
          cp -r build/linux/x64/release/bundle/* "$APP/"

          if [ -f "assets/icon/icon.png" ]; then
            cp assets/icon/icon.png "$APP/WAVE.png"
          elif [ -f "icon.png" ]; then
            cp icon.png "$APP/WAVE.png"
          else
            touch "$APP/WAVE.png"
          fi

          cat <<EOF > "$APP/WAVE.desktop"
          [Desktop Entry]
          Name=WAVE
          Exec=AppRun
          Icon=WAVE
          Type=Application
          Categories=AudioVideo;Audio;Player;
          EOF

          printf '#!/bin/sh\ncd "$(dirname "$0")"\nexec ./wave "$@"\n' > "$APP/AppRun"
          chmod +x "$APP/AppRun"

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$APP" WAVE-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: WAVE-Linux-x64
          path: WAVE-Linux-x86_64.AppImage

  # ─── macOS ARM64 (Apple Silicon) ─────────────────────────────────────────
  macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Configure macOS platform files
        run: |
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

      - name: Create .env from secret
        run: echo "DEEZER_PROXY_URL=${{ secrets.DEEZER_PROXY_URL }}" > .env

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Test Launching macOS App
        run: |
          build/macos/Build/Products/Release/WAVE.app/Contents/MacOS/wave &
          APP_PID=$!
          sleep 10
          kill $APP_PID 2>/dev/null || true
          echo "App launched and ran for 10s without crashing."

      - name: Package as DMG
        run: |
          cd build/macos/Build/Products/Release
          mv wave.app WAVE.app

          codesign --sign - --force --deep WAVE.app

          mkdir -p dmg_temp
          cp -R WAVE.app dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "WAVE" -srcfolder dmg_temp -ov -format UDZO ../../../../../WAVE-macOS-arm64.dmg
          zip -ry ../../../../../WAVE-macOS-arm64.zip WAVE.app

      - uses: actions/upload-artifact@v4
        with:
          name: WAVE-macOS-arm64
          path: |
            WAVE-macOS-arm64.dmg
            WAVE-macOS-arm64.zip

  # ─── macOS Intel (x86_64 via Rosetta 2) ─────────────────────────────────
  macos-intel:
    name: macOS (Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          architecture: x64

      - name: Create .env from secret
        run: echo "DEEZER_PROXY_URL=${{ secrets.DEEZER_PROXY_URL }}" > .env

      - run: arch -x86_64 flutter pub get
      - run: arch -x86_64 flutter build macos --release

      - name: Test Launching macOS Intel App
        run: |
          arch -x86_64 build/macos/Build/Products/Release/WAVE.app/Contents/MacOS/wave &
          APP_PID=$!
          sleep 10
          kill $APP_PID 2>/dev/null || true
          echo "App launched and ran for 10s without crashing."

      - name: Package as DMG
        run: |
          cd build/macos/Build/Products/Release
          mv wave.app WAVE.app

          codesign --sign - --force --deep WAVE.app

          mkdir -p dmg_temp
          cp -R WAVE.app dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "WAVE" -srcfolder dmg_temp -ov -format UDZO ../../../../../WAVE-macOS-intel.dmg
          zip -ry ../../../../../WAVE-macOS-intel.zip WAVE.app

      - uses: actions/upload-artifact@v4
        with:
          name: WAVE-macOS-intel
          path: |
            WAVE-macOS-intel.dmg
            WAVE-macOS-intel.zip

  # ─── iOS (Sideloadable IPA — no signing) ─────────────────────────────────
  ios:
    name: iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - name: Create .env from secret
        run: echo "DEEZER_PROXY_URL=${{ secrets.DEEZER_PROXY_URL }}" > .env

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Package as IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -ry ../../../WAVE-iOS.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: WAVE-iOS
          path: WAVE-iOS.ipa

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create Release
    needs: [windows, linux-x64, macos-arm64, macos-intel, ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            WAVE-Windows-Installer/*.exe
            WAVE-Linux-x64/*.AppImage
            WAVE-macOS-arm64/*.dmg
            WAVE-macOS-arm64/*.zip
            WAVE-macOS-intel/*.dmg
            WAVE-macOS-intel/*.zip
            WAVE-iOS/*.ipa
